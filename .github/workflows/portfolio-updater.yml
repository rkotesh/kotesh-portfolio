name: Auto-Update Portfolio

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Updater Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_portfolio.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to HTML or JS files
          if [[ -n "$(git status --porcelain index.html script.js)" ]]; then
            git add index.html script.js
            git commit -m "auto: update portfolio content from github and issues [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
            echo "Changes pushed successfully!"
          else
            echo "No changes detected."
          fi
